{% extends 'base.html' %}
{% block title %}Register - HDI Predictor{% endblock %}
{% block content %}
<div class="container py-5">
    <div class="row justify-content-center">
        <div class="col-md-6 col-lg-5">
            <div class="card shadow-lg border-0 rounded-4 mt-3 animate-slide-up glass-card-solid">
                <div class="card-body p-5">
                    <div class="text-center mb-4">
                        <div class="bg-primary text-white rounded-circle d-inline-flex align-items-center justify-content-center mb-3" style="width: 60px; height: 60px; font-size: 1.5rem;">
                            <i class="fa-solid fa-user-plus"></i>
                        </div>
                        <h3 class="fw-bold">Create Account</h3>
                        <p class="text-muted">Join the HDI Predictor platform</p>
                    </div>
                    
                    <form method="POST" action="{{ url_for('auth.register') }}" class="needs-validation" novalidate>
                        <div class="form-floating mb-3">
                            <input type="text" class="form-control rounded-pill px-4" id="username" name="username" placeholder="Username" required>
                            <label for="username" class="px-4">Username</label>
                            <div class="invalid-feedback px-3">Please choose a username.</div>
                        </div>
                        <div class="form-floating mb-3">
                            <input type="email" class="form-control rounded-pill px-4" id="email" name="email" placeholder="name@example.com" required>
                            <label for="email" class="px-4">Email address</label>
                            <div class="invalid-feedback px-3">Please enter a valid email.</div>
                        </div>
                        
                        <div class="form-floating mb-3">
                            <select class="form-select rounded-pill px-4" id="role" name="role" aria-label="Role selection">
                                <option value="Student" selected>Student</option>
                                <option value="Researcher">Researcher</option>
                                <option value="Policy Maker">Policy Maker</option>
                            </select>
                            <label for="role" class="px-4">I am a...</label>
                        </div>

                        <div class="form-floating mb-4">
                            <input type="password" class="form-control rounded-pill px-4" id="password" name="password" placeholder="Password" required minlength="6">
                            <label for="password" class="px-4">Password</label>
                            <div class="invalid-feedback px-3">Password must be at least 6 characters.</div>
                        </div>
                        
                        <div class="d-grid gap-2">
                            <button type="submit" class="btn btn-primary btn-lg rounded-pill fw-bold hover-scale shadow-sm">Create Account</button>
                        </div>
                    </form>
                    
                    <div class="text-center mt-4 pt-3 border-top">
                        <p class="mb-0 text-muted">Already have an account? <a href="{{ url_for('auth.login') }}" class="text-decoration-none fw-bold">Login here</a></p>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
