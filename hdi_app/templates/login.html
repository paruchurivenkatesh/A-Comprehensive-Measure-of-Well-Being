{% extends 'base.html' %}
{% block title %}Login - HDI Predictor{% endblock %}
{% block content %}
<div class="container py-5">
    <div class="row justify-content-center">
        <div class="col-md-6 col-lg-5">
            <div class="card shadow-lg border-0 rounded-4 mt-5 animate-slide-up glass-card-solid">
                <div class="card-body p-5">
                    <div class="text-center mb-4">
                        <div class="bg-primary text-white rounded-circle d-inline-flex align-items-center justify-content-center mb-3" style="width: 60px; height: 60px; font-size: 1.5rem;">
                            <i class="fa-solid fa-lock"></i>
                        </div>
                        <h3 class="fw-bold">Welcome Back</h3>
                        <p class="text-muted">Login to your account</p>
                    </div>
                    
                    <form method="POST" action="{{ url_for('auth.login') }}" class="needs-validation" novalidate>
                        <div class="form-floating mb-3">
                            <input type="email" class="form-control rounded-pill px-4" id="email" name="email" placeholder="name@example.com" required>
                            <label for="email" class="px-4">Email address</label>
                            <div class="invalid-feedback px-3">Please enter a valid email.</div>
                        </div>
                        <div class="form-floating mb-4">
                            <input type="password" class="form-control rounded-pill px-4" id="password" name="password" placeholder="Password" required>
                            <label for="password" class="px-4">Password</label>
                            <div class="invalid-feedback px-3">Please enter your password.</div>
                        </div>
                        
                        <div class="d-grid gap-2">
                            <button type="submit" class="btn btn-primary btn-lg rounded-pill fw-bold hover-scale shadow-sm">Login</button>
                        </div>
                    </form>
                    
                    <div class="text-center mt-4 pt-3 border-top">
                        <p class="mb-0 text-muted">Don't have an account? <a href="{{ url_for('auth.register') }}" class="text-decoration-none fw-bold">Sign up</a></p>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
